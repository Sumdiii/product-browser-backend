<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Browser</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    header { background: #0d47a1; color: white; padding: 16px; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 18px; flex: 1; min-width: 280px; }
    .controls { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    label { display: block; font-size: 0.95rem; margin-bottom: 8px; }
    select, button, input { font-size: 1rem; padding: 10px 12px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; background: #0d47a1; color: white; border: none; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    ul.products { list-style: none; padding: 0; margin: 0; }
    ul.products li { border-bottom: 1px solid #eee; padding: 14px 0; }
    ul.products li:last-child { border-bottom: none; }
    .product-name { font-weight: 600; margin-bottom: 6px; }
    .product-meta { color: #555; font-size: 0.95rem; }
    .small { color: #777; font-size: 0.95rem; }
    .notice { padding: 14px; background: #fffbdd; border: 1px solid #f7ecb5; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>Product Browser</h1>
    <p>Use this page to browse your backend products and pagination.</p>
  </header>
  <main>
    <div class="row">
      <div class="card">
        <h2>Backend status</h2>
        <p class="small">Server URL: <code>same origin</code></p>
        <p><strong>Categories:</strong> <span id="stats-categories">Loading...</span></p>
        <p><strong>Total products:</strong> <span id="stats-total">Loading...</span></p>
      </div>
      <div class="card">
        <h2>Controls</h2>
        <div class="controls">
          <div style="flex:1; min-width:180px;">
            <label for="category">Category</label>
            <select id="category">
              <option value="">All</option>
            </select>
          </div>
          <div style="flex:1; min-width:120px;">
            <label for="limit">Page size</label>
            <select id="limit">
              <option>5</option>
              <option>10</option>
              <option>20</option>
            </select>
          </div>
          <div style="align-self:flex-end;">
            <button id="refresh">Refresh</button>
          </div>
        </div>
        <p class="small">Use the buttons below to navigate pages.</p>
        <div class="controls">
          <button id="prev" disabled>Previous</button>
          <button id="next" disabled>Next</button>
        </div>
        <p class="small">Current cursor: <span id="cursor-text">none</span></p>
      </div>
    </div>

    <div class="notice" id="notice" style="display:none"></div>

    <div class="card">
      <h2>Products</h2>
      <ul class="products" id="product-list"></ul>
      <p id="empty-message" class="small" style="display:none;">No products found.</p>
    </div>
  </main>

  <script>
    const state = { nextCursor: null, prevCursors: [], category: '', limit: 5 };

    // ✅ Empty string = same origin. If the frontend is served from
    // a different port (e.g. Live Server on :5501), point to backend on :5000
    const apiBase = (function() {
      const port = window.location.port;
      if (port && port !== '5000') {
        return 'http://localhost:5000';
      }
      return '';
    })();

    const els = {
      categories: document.getElementById('stats-categories'),
      total: document.getElementById('stats-total'),
      category: document.getElementById('category'),
      limit: document.getElementById('limit'),
      refresh: document.getElementById('refresh'),
      prev: document.getElementById('prev'),
      next: document.getElementById('next'),
      productList: document.getElementById('product-list'),
      empty: document.getElementById('empty-message'),
      cursorText: document.getElementById('cursor-text'),
      notice: document.getElementById('notice'),
    };

    async function fetchJson(path) {
      const res = await fetch(apiBase + path);
      if (!res.ok) throw new Error('Request failed: ' + res.status);
      return res.json();
    }

    async function loadStats() {
      try {
        const cats = await fetchJson('/categories');
        const stats = await fetchJson('/stats');
        els.categories.textContent = cats.join(', ');
        els.total.textContent = stats.total;
        els.category.innerHTML = '<option value="">All</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
      } catch (err) {
        showNotice(err.message, true);
      }
    }

    function updateCursorText() {
      els.cursorText.textContent = state.nextCursor || 'none';
    }

    function showNotice(message, isError = false) {
      els.notice.style.display = 'block';
      els.notice.textContent = message;
      els.notice.style.background = isError ? '#ffd6d6' : '#fffbdd';
      els.notice.style.borderColor = isError ? '#f5c2c2' : '#f7ecb5';
      setTimeout(() => { els.notice.style.display = 'none'; }, 5000);
    }

    async function loadProducts(cursor = null, direction = 'next') {
      try {
        let path = `/products?limit=${state.limit}`;
        if (state.category) path += `&category=${encodeURIComponent(state.category)}`;
        if (cursor) path += `&cursor=${encodeURIComponent(cursor)}`;

        const data = await fetchJson(path);
        renderProducts(data.products);
        if (direction === 'next' && state.nextCursor) {
          state.prevCursors.push(state.nextCursor);
        }
        state.nextCursor = data.nextCursor;
        els.prev.disabled = state.prevCursors.length === 0;
        els.next.disabled = !data.hasMore;
        updateCursorText();
        if (!data.products.length) els.empty.style.display = 'block';
        else els.empty.style.display = 'none';
      } catch (err) {
        showNotice(err.message, true);
      }
    }

    function renderProducts(products) {
      els.productList.innerHTML = products.map(p => `
        <li>
          <div class="product-name">${p.name}</div>
          <div class="product-meta">Category: ${p.category} · Price: $${p.price}</div>
          <div class="small">Created at: ${new Date(p.created_at).toLocaleString()}</div>
        </li>
      `).join('');
    }

    els.refresh.addEventListener('click', () => {
      state.prevCursors = [];
      state.nextCursor = null;
      state.category = els.category.value;
      state.limit = parseInt(els.limit.value, 10);
      loadProducts();
    });

    els.next.addEventListener('click', () => {
      if (!state.nextCursor) return;
      loadProducts(state.nextCursor, 'next');
    });

    els.prev.addEventListener('click', () => {
      if (!state.prevCursors.length) return;
      state.nextCursor = state.prevCursors.pop();
      const prevCursor = state.prevCursors.pop();
      if (prevCursor) {
        state.nextCursor = prevCursor;
        loadProducts(prevCursor, 'prev');
      } else {
        state.nextCursor = null;
        state.prevCursors = [];
        loadProducts();
      }
    });

    window.addEventListener('load', async () => {
      await loadStats();
      loadProducts();
    });
  </script>
</body>
</html>
